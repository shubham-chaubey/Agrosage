name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # NOTE: requirements.txt is UTF-16 encoded in this repo and pip cannot
          # always parse it, so core runtime deps are installed explicitly here.
          # Once requirements.txt is re-saved as UTF-8, replace the line below with:
          #   pip install -r requirements.txt
          pip install flask gunicorn pandas numpy scikit-learn joblib google-generativeai python-dotenv requests scipy
          pip install -r requirements-dev.txt

      - name: Run pytest
        env:
          GEMINI_API_KEY: "test-dummy-key"
          FLASK_SECRET_KEY: "ci-secret"
        run: pytest

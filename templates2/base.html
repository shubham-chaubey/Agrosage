<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgroSage 2.0 - {% block title %}{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  <script src="{{ url_for('static', filename='js/scripts.js') }}" defer></script>
</head>
<body>
  <header>
    <div class="logo">🌱 AgroSage</div>
    <nav>
      <a href="{{ url_for('home') }}">Home</a>
      <a href="{{ url_for('query') }}">Ask Query</a>
      <a href="{{ url_for('recommendation') }}">Recommendation</a>
      <a href="{{url_for('features')}}">Features</a>
      <!-- <a href="#features">Features</a> -->
      <a href="{{ url_for('contact') }}">Contact</a>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer id="contact">
    <div class="footer-content">
      <p>© 2025 AgroSage. Built for farmers, by innovators.</p>
      <div class="social">
        <a href="#">🌐</a>
        <a href="#">📘</a>
        <a href="#">🐦</a>
      </div>
    </div>
  </footer>
</body>
</html>
